  <path d="M26 28 C22 18, 18 12, 8 10" stroke="#3aaa4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M26 28 C26 18, 28 10, 24 6" stroke="#34a044" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M26 28 C30 18, 36 12, 44 10" stroke="#3aaa4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M26 28 C32 22, 40 20, 48 22" stroke="#2d8c3e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M26 28 C28 20, 32 14, 34 8" stroke="#40b850" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sun -->
